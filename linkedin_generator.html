<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Message Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 32px; color: #1a1a1a; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: #111; }
  .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
  textarea { width: 100%; border: 1px solid #e0e0e0; border-radius: 6px; padding: 12px; font-size: 13px; font-family: 'SF Mono', monospace; resize: vertical; min-height: 260px; color: #1a1a1a; outline: none; transition: border 0.2s; }
  textarea:focus { border-color: #888; }
  button { background: #1a1a1a; color: #fff; border: none; border-radius: 6px; padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #333; }
  button:disabled { background: #999; cursor: not-allowed; }
  .output { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: none; }
  .output-text { font-size: 15px; line-height: 1.7; color: #1a1a1a; white-space: pre-wrap; margin-bottom: 16px; }
  .char-count { font-size: 13px; color: #888; }
  .char-count.over { color: #e53e3e; font-weight: 600; }
  .status { font-size: 13px; color: #888; margin-top: 12px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .copy-btn { background: #f0f0f0; color: #333; font-size: 13px; padding: 8px 16px; }
  .copy-btn:hover { background: #e0e0e0; }
</style>
</head>
<body>
<div class="container">
  <h1>Basalt Systems — LinkedIn Message Generator</h1>

  <div class="card">
    <label>Lead DB Record (JSON)</label>
    <textarea id="leadInput">{
  "_id": { "$oid": "6a3e8fc5f3d2e85557b237be" },
  "url": "https://www.linkedin.com/company/marketing-lancashire/",
  "title": "Marketing Lancashire",
  "description": "Marketing Lancashire is the agency charged with promoting the county on a national and international stage and leads the Lancashire LVEP (Local Visitor Economy Partnership). Our activities in marketing and communications, commercial membership and place marketing are focused on promoting sustainable economic development and growth; raising the profile of Lancashire as a leading leisure, learning and business destination for domestic and international visitors.",
  "category": "Advertising Services",
  "specialties": ["Destination Marketing", "Tourism", "and New Media"],
  "company_size": "2-10 employees",
  "founded_year": "2012",
  "headquarters": "Preston, Lancashire",
  "industry": "Advertising Services",
  "website": "http://www.marketinglancashire.com",
  "contact_name": null
}</textarea>
    <div style="margin-top:14px;">
      <button id="generateBtn" onclick="generate()">Generate Message</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="output" id="output">
    <div class="header-row">
      <label style="margin:0;">Generated Message</label>
      <button class="copy-btn" onclick="copyMsg()">Copy</button>
    </div>
    <div class="output-text" id="msgText"></div>
    <div class="char-count" id="charCount"></div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are an outreach copywriter for Basalt Systems, a small dev team. You write LinkedIn connection request messages to founders and directors of marketing agencies.

Write one LinkedIn connection request message. Nothing else. No commentary, no alternatives.

# Context

This message is sent alongside a LinkedIn connection request. The recipient has not yet accepted. They know nothing about Basalt Systems. The goal is to give them a reason to accept — not to pitch, not to close.

# Message structure (3 parts, in order)

1. Opening: one short sentence referencing what their agency does. Specific, not generic. If contact_name is available, use it: "Hi [name]," — otherwise just "Hi,"
2. What we do: one sentence. "We're a dev team that handles the technical requests marketing agencies can't — websites, automations, chatbots, and lightweight tools, delivered under your brand."
3. CTA: one sentence inviting conversation, nothing more. "Would love to connect if this is ever relevant."

# Rules

- Total message length: 250 characters maximum. Count carefully.
- No subject line.
- Sound human. Write like a person, not a marketing department.
- No buzzwords: no leverage, synergy, cutting-edge, innovative, seamlessly.
- No dashes. Use commas or periods only.
- Do not mention Poland, pricing, team size, or AI.
- Do not use "I wanted to reach out" or "I hope this finds you well."
- If the message exceeds 250 characters, cut from part 2 first, then part 1. Never cut the CTA.

# Output

Return only the message. No labels, no preamble, no explanation.`;

async function generate() {
  const btn = document.getElementById('generateBtn');
  const status = document.getElementById('status');
  const output = document.getElementById('output');
  const msgText = document.getElementById('msgText');
  const charCount = document.getElementById('charCount');

  let lead;
  try {
    lead = JSON.parse(document.getElementById('leadInput').value);
  } catch(e) {
    status.textContent = 'Invalid JSON.';
    return;
  }

  btn.disabled = true;
  status.textContent = 'Generating...';
  output.style.display = 'none';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: `Lead record:\n${JSON.stringify(lead, null, 2)}` }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text?.trim();
    if (!text) throw new Error('No response');

    msgText.textContent = text;
    const len = text.length;
    charCount.textContent = `${len} / 250 characters`;
    charCount.className = 'char-count' + (len > 250 ? ' over' : '');
    output.style.display = 'block';
    status.textContent = '';
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function copyMsg() {
  const text = document.getElementById('msgText').textContent;
  navigator.clipboard.writeText(text);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 2000);
}
</script>
</body>
</html>
